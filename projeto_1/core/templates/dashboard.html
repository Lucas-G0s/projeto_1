{% extends 'base.html' %}
{% load static %}

{% block titulo %}
{% endblock %}

{% block estilo %}
<link rel="stylesheet" href="{% static 'assets/css/dashboard.css' %}">
{% endblock %}

{% block scripts %}
{% endblock %}

{% block conteudo %}
      <div class="db-section">
        <h2>Cadastrar Curso</h2>
        <form>
          <div class="db-form-grid">

            <!-- text -->
            <div class="db-form-group">
              <label for="f-nome">Nome do curso</label>
              <input type="text" id="f-nome" placeholder="Ex.: Introdução à Programação">
            </div>

            <!-- select -->
            <div class="db-form-group">
              <label for="f-area">Área</label>
              <select id="f-area">
                <option value="">Selecione...</option>
                <option>Informática</option>
                <option>Eletromecânica</option>
                <option>Eventos</option>
                <option>Design</option>
              </select>
            </div>

            <!-- number -->
            <div class="db-form-group">
              <label for="f-vagas">Vagas</label>
              <input type="number" id="f-vagas" min="1" placeholder="30">
            </div>

            <!-- email -->
            <div class="db-form-group">
              <label for="f-email">E-mail do responsável</label>
              <input type="email" id="f-email" placeholder="professor@ifrn.edu.br">
            </div>

            <!-- date -->
            <div class="db-form-group">
              <label for="f-data">Data de início</label>
              <input type="date" id="f-data">
            </div>

            <!-- time -->
            <div class="db-form-group">
              <label for="f-hora">Horário</label>
              <input type="time" id="f-hora">
            </div>

            <!-- textarea (full width) -->
            <div class="db-form-group db-col-3">
              <label for="f-desc">Descrição</label>
              <textarea id="f-desc" placeholder="Descreva o curso..."></textarea>
            </div>

            <!-- radio -->
            <div class="db-form-group">
              <label>Status</label>
              <div class="db-inline">
                <label><input type="radio" name="status" value="ativo" checked> Ativo</label>
                <label><input type="radio" name="status" value="inativo"> Inativo</label>
              </div>
            </div>

            <!-- checkbox -->
            <div class="db-form-group db-col-2">
              <label>Público-alvo</label>
              <div class="db-inline">
                <label><input type="checkbox" checked> Estudantes</label>
                <label><input type="checkbox"> Comunidade</label>
                <label><input type="checkbox"> Profissionais</label>
              </div>
            </div>

            <!-- range -->
            <div class="db-form-group">
              <label for="f-carga">Carga horária: <span id="cargaVal">40</span>h</label>
              <input type="range" id="f-carga" min="20" max="200" value="40"
                     oninput="document.getElementById('cargaVal').textContent=this.value">
            </div>

            <!-- color -->
            <div class="db-form-group">
              <label for="f-cor">Cor de destaque</label>
              <input type="color" id="f-cor" value="#006fe8">
            </div>

            <!-- file -->
            <div class="db-form-group">
              <label for="f-foto">Foto do curso</label>
              <input type="file" id="f-foto" accept="image/*">
            </div>

            <!-- password -->
            <div class="db-form-group">
              <label for="f-senha">Senha de acesso</label>
              <input type="password" id="f-senha" placeholder="••••••••">
            </div>

          </div>

          <button type="submit" class="btn btn-primary">Salvar</button>
        </form>
      </div>  
{% endblock %}
